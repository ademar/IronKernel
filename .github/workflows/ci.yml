name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore IronKernel.sln

      - name: Build
        run: dotnet build IronKernel.sln -c Release --no-restore

      - name: Test
        run: dotnet test IronKernel.sln -c Release --no-build --verbosity normal
