name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test (linux)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test IronKernel.sln -c Release --verbosity normal

  publish:
    name: Publish ${{ matrix.rid }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            exe: IronKernel
          - os: blacksmith-4vcpu-windows-2025
            rid: win-x64
            exe: IronKernel.exe
          - os: macos-latest
            rid: osx-arm64
            exe: IronKernel
          - os: blacksmith-6vcpu-macos-latest
            rid: osx-x64
            exe: IronKernel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish single-file binary
        run: >
          dotnet publish IronKernel/IronKernel.fsproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/${{ matrix.rid }}

      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          STAGE="dist/ironkernel-${{ matrix.rid }}"
          mkdir -p "$STAGE"
          cp "publish/${{ matrix.rid }}/${{ matrix.exe }}" "$STAGE/"
          cp IronKernel/kernel.scm IronKernel/promises.scm "$STAGE/"
          cp README.md COPYING "$STAGE/"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "$STAGE/${{ matrix.exe }}"
          fi
          tar -C dist -czf "dist/ironkernel-${{ matrix.rid }}.tar.gz" "ironkernel-${{ matrix.rid }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ironkernel-${{ matrix.rid }}
          path: dist/ironkernel-${{ matrix.rid }}.tar.gz

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -name '*.tar.gz' -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
